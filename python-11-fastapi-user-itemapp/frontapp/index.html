<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>のみの市 — フリーマーケット</title>

  <!-- Fonts: Zen Kaku Gothic New (display/JP) · Murecho (body/JP) · Space Mono (prices) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Murecho:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============================ MASTHEAD ============================ -->
  <header class="masthead">
    <div class="masthead__inner">
      <a class="brand" href="/" aria-label="のみの市 ホーム">
        <svg class="brand__mark" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 11.2 11.2 3H20a1 1 0 0 1 1 1v8.2l-8.2 8.2a1.4 1.4 0 0 1-2 0L3 13.2a1.4 1.4 0 0 1 0-2Z" fill="currentColor"/>
          <circle cx="16.4" cy="7.6" r="1.7" fill="#184E38"/>
        </svg>
        <span class="brand__name">のみの市</span>
        <span class="brand__sub">Flea Market</span>
      </a>

      <div class="search">
        <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search-input" class="search__input" type="search" maxlength="20"
               placeholder="ほしいモノを探す（2文字以上）" aria-label="商品名で検索">
      </div>

      <div class="account" id="account-area"><!-- filled by app.js --></div>
    </div>
  </header>

  <!-- ============================ MAIN =============================== -->
  <div class="wrap">
    <div class="toolbar">
      <h1 class="toolbar__title">
        ぜんぶの出品
        <span id="count" class="toolbar__count" hidden></span>
        <span id="searching-label" class="toolbar__searching" hidden></span>
      </h1>
      <button id="sell-btn" class="btn btn--sell">＋ 出品する</button>
    </div>

    <main>
      <section id="grid" class="grid" aria-live="polite" aria-busy="false"></section>

      <div id="empty" class="empty" hidden>
        <svg class="empty__mark" width="44" height="44" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 11.2 11.2 3H20a1 1 0 0 1 1 1v8.2l-8.2 8.2a1.4 1.4 0 0 1-2 0L3 13.2a1.4 1.4 0 0 1 0-2Z" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="16.4" cy="7.6" r="1.6" fill="currentColor"/>
        </svg>
        <h2 class="empty__title" id="empty-title">まだ出品がありません</h2>
        <p class="empty__text" id="empty-text">最初の品物を並べて、市を始めましょう。</p>
        <button id="empty-sell-btn" class="btn btn--amber btn--lg">＋ 出品する</button>
      </div>
    </main>
  </div>

  <!-- ============================ AUTH DIALOG ======================== -->
  <dialog id="auth-dialog" class="dialog" aria-labelledby="auth-title">
    <form id="auth-form" class="dialog__panel" novalidate>
      <div class="dialog__head">
        <h2 class="dialog__title" id="auth-title">ようこそ</h2>
        <button type="button" class="dialog__close" data-close aria-label="閉じる">×</button>
      </div>

      <div class="tabs" role="tablist">
        <button type="button" class="tab" id="tab-login"  role="tab" aria-selected="true"  data-mode="login">ログイン</button>
        <button type="button" class="tab" id="tab-signup" role="tab" aria-selected="false" data-mode="signup">新規登録</button>
      </div>

      <p class="dialog__sub" id="auth-note" hidden></p>
      <div class="form-error" id="auth-error" hidden></div>

      <div class="field">
        <label class="field__label" for="auth-username">ユーザー名 <span class="field__hint">2〜50文字</span></label>
        <input class="input" id="auth-username" name="username" autocomplete="username" minlength="2" maxlength="50" required>
      </div>

      <div class="field">
        <label class="field__label" for="auth-password">パスワード <span class="field__hint">8文字以上</span></label>
        <input class="input" id="auth-password" name="password" type="password" autocomplete="current-password" minlength="8" maxlength="255" required>
      </div>

      <button class="btn btn--block btn--lg" id="auth-submit" type="submit">ログイン</button>
    </form>
  </dialog>

  <!-- ============================ ITEM DIALOG ======================== -->
  <dialog id="item-dialog" class="dialog" aria-labelledby="item-title">
    <form id="item-form" class="dialog__panel" novalidate>
      <div class="dialog__head">
        <h2 class="dialog__title" id="item-title">出品する</h2>
        <button type="button" class="dialog__close" data-close aria-label="閉じる">×</button>
      </div>
      <p class="dialog__sub" id="item-sub">品物の情報を入力してください。</p>

      <div class="form-error" id="item-error" hidden></div>

      <div class="field">
        <label class="field__label" for="item-name">品名 <span class="field__hint">2〜50文字</span></label>
        <input class="input" id="item-name" name="name" minlength="2" maxlength="50" required placeholder="例：木製の椅子">
      </div>

      <div class="field">
        <label class="field__label" for="item-price">価格 <span class="field__hint">1円以上・整数</span></label>
        <div class="field__control">
          <span class="price-prefix">¥</span>
          <input class="input input--price" id="item-price" name="price" type="number" min="1" step="1" inputmode="numeric" required placeholder="3000">
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="item-desc">説明 <span class="field__hint">任意・255文字まで</span></label>
        <textarea class="textarea" id="item-desc" name="description" maxlength="255" placeholder="状態やサイズなど"></textarea>
      </div>

      <div class="field" id="status-field" hidden>
        <label class="field__label" for="item-status">販売状況</label>
        <select class="select" id="item-status" name="status">
          <option value="ON_SALE">出品中</option>
          <option value="SOLD_OUT">売切れ</option>
        </select>
      </div>

      <div class="dialog__foot">
        <button type="button" class="btn btn--ghost" data-close style="color:var(--ink-soft);border-color:var(--line);">やめる</button>
        <button class="btn btn--amber" id="item-submit" type="submit">この内容で出品する</button>
      </div>
    </form>
  </dialog>

  <!-- ============================ CONFIRM DIALOG ===================== -->
  <dialog id="confirm-dialog" class="dialog" aria-labelledby="confirm-title">
    <div class="dialog__panel confirm__panel">
      <div class="dialog__head">
        <h2 class="dialog__title" id="confirm-title">出品を取り下げますか？</h2>
        <button type="button" class="dialog__close" data-close aria-label="閉じる">×</button>
      </div>
      <p class="dialog__sub"><span class="confirm__name" id="confirm-name"></span> を削除します。この操作は取り消せません。</p>
      <div class="dialog__foot">
        <button type="button" class="btn btn--ghost" data-close style="color:var(--ink-soft);border-color:var(--line);">やめる</button>
        <button type="button" class="btn" id="confirm-ok" style="background:var(--stamp);">削除する</button>
      </div>
    </div>
  </dialog>

  <div id="toasts" class="toasts" aria-live="assertive" aria-atomic="true"></div>

  <!-- ?v=4 はキャッシュ破棄用。app.js を編集したら数字を上げると確実に最新が読まれます -->
  <script src="app.js?v=5"></script>
</body>
</html>

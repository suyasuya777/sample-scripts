<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>のみの市 — フリーマーケット</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Murecho:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============================ MASTHEAD ============================ -->
  <header class="masthead">
    <div class="masthead__inner">
      <a class="brand" href="javascript:void(0)" aria-label="のみの市 ホーム">
        <svg class="brand__mark" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 11.2 11.2 3H20a1 1 0 0 1 1 1v8.2l-8.2 8.2a1.4 1.4 0 0 1-2 0L3 13.2a1.4 1.4 0 0 1 0-2Z" fill="currentColor"/>
          <circle cx="16.4" cy="7.6" r="1.7" fill="#184E38"/>
        </svg>
        <span class="brand__name">のみの市</span>
        <span class="brand__sub">Flea Market · build9（埋め込み版）</span>
      </a>

      <div class="search">
        <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search-input" class="search__input" type="search" maxlength="20"
               placeholder="ほしいモノを探す" aria-label="商品名で検索">
      </div>

      <div class="account" id="account-area"><!-- filled by script --></div>
    </div>
  </header>

  <!-- ============================ MAIN =============================== -->
  <div class="wrap">
    <div class="toolbar">
      <h1 class="toolbar__title">
        ぜんぶの出品
        <span id="count" class="toolbar__count" hidden></span>
        <span id="searching-label" class="toolbar__searching" hidden></span>
      </h1>
      <button id="sell-btn" class="btn btn--sell" type="button">＋ 出品する</button>
    </div>

    <main>
      <section id="grid" class="grid" aria-live="polite" aria-busy="false"></section>

      <div id="empty" class="empty" hidden>
        <svg class="empty__mark" width="44" height="44" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3 11.2 11.2 3H20a1 1 0 0 1 1 1v8.2l-8.2 8.2a1.4 1.4 0 0 1-2 0L3 13.2a1.4 1.4 0 0 1 0-2Z" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="16.4" cy="7.6" r="1.6" fill="currentColor"/>
        </svg>
        <h2 class="empty__title" id="empty-title">まだ出品がありません</h2>
        <p class="empty__text" id="empty-text">最初の品物を並べて、市を始めましょう。</p>
        <button id="empty-sell-btn" class="btn btn--amber btn--lg" type="button">＋ 出品する</button>
      </div>
    </main>
  </div>

  <!-- ============================ AUTH DIALOG ======================== -->
  <dialog id="auth-dialog" class="dialog" aria-labelledby="auth-title">
    <!-- onsubmit="return false" : Enter キーでもページ遷移させない -->
    <form id="auth-form" class="dialog__panel" novalidate onsubmit="return false">
      <div class="dialog__head">
        <h2 class="dialog__title" id="auth-title">ようこそ</h2>
        <button type="button" class="dialog__close" data-close aria-label="閉じる">×</button>
      </div>

      <div class="tabs" role="tablist">
        <button type="button" class="tab" id="tab-login"  role="tab" aria-selected="true"  data-mode="login">ログイン</button>
        <button type="button" class="tab" id="tab-signup" role="tab" aria-selected="false" data-mode="signup">新規登録</button>
      </div>

      <p class="dialog__sub" id="auth-note" hidden></p>
      <div class="form-error" id="auth-error" hidden></div>
      <div id="auth-status" style="font-size:13px;color:#5a6;margin:4px 0;min-height:18px;"></div>

      <div class="field">
        <label class="field__label" for="auth-username">ユーザー名 <span class="field__hint">2〜50文字</span></label>
        <input class="input" id="auth-username" name="username" autocomplete="off" minlength="2" maxlength="50" required>
      </div>

      <div class="field">
        <label class="field__label" for="auth-password">パスワード <span class="field__hint">8文字以上</span></label>
        <input class="input" id="auth-password" name="password" type="password" autocomplete="off" minlength="8" maxlength="255" required>
      </div>

      <!-- type="button" + onclick : フォーム送信を一切起こさず、JS で処理する -->
      <button class="btn btn--block btn--lg" id="auth-submit" type="button" onclick="submitAuth(event)">ログイン</button>
    </form>
  </dialog>

  <!-- ============================ ITEM DIALOG ======================== -->
  <dialog id="item-dialog" class="dialog" aria-labelledby="item-title">
    <form id="item-form" class="dialog__panel" novalidate onsubmit="return false">
      <div class="dialog__head">
        <h2 class="dialog__title" id="item-title">出品する</h2>
        <button type="button" class="dialog__close" data-close aria-label="閉じる">×</button>
      </div>
      <p class="dialog__sub" id="item-sub">品物の情報を入力してください。</p>

      <div class="form-error" id="item-error" hidden></div>

      <div class="field">
        <label class="field__label" for="item-name">品名 <span class="field__hint">2〜50文字</span></label>
        <input class="input" id="item-name" name="name" minlength="2" maxlength="50" required placeholder="例：木製の椅子">
      </div>

      <div class="field">
        <label class="field__label" for="item-price">価格 <span class="field__hint">1円以上・整数</span></label>
        <div class="field__control">
          <span class="price-prefix">¥</span>
          <input class="input input--price" id="item-price" name="price" type="number" min="1" step="1" inputmode="numeric" required placeholder="3000">
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="item-desc">説明 <span class="field__hint">任意・255文字まで</span></label>
        <textarea class="textarea" id="item-desc" name="description" maxlength="255" placeholder="状態やサイズなど"></textarea>
      </div>

      <div class="field" id="status-field" hidden>
        <label class="field__label" for="item-status">販売状況</label>
        <select class="select" id="item-status" name="status">
          <option value="ON_SALE">出品中</option>
          <option value="SOLD_OUT">売切れ</option>
        </select>
      </div>

      <div class="dialog__foot">
        <button type="button" class="btn btn--ghost" data-close style="color:var(--ink-soft);border-color:var(--line);">やめる</button>
        <button class="btn btn--amber" id="item-submit" type="button" onclick="submitItem(event)">この内容で出品する</button>
      </div>
    </form>
  </dialog>

  <!-- ============================ CONFIRM DIALOG ===================== -->
  <dialog id="confirm-dialog" class="dialog" aria-labelledby="confirm-title">
    <div class="dialog__panel confirm__panel">
      <div class="dialog__head">
        <h2 class="dialog__title" id="confirm-title">出品を取り下げますか？</h2>
        <button type="button" class="dialog__close" data-close aria-label="閉じる">×</button>
      </div>
      <p class="dialog__sub"><span class="confirm__name" id="confirm-name"></span> を削除します。この操作は取り消せません。</p>
      <div class="dialog__foot">
        <button type="button" class="btn btn--ghost" data-close style="color:var(--ink-soft);border-color:var(--line);">やめる</button>
        <button type="button" class="btn" id="confirm-ok" style="background:var(--stamp);">削除する</button>
      </div>
    </div>
  </dialog>

  <div id="toasts" class="toasts" aria-live="assertive" aria-atomic="true"></div>

  <!-- =====================================================================
       JavaScript は外部 app.js ではなく、この HTML に直接埋め込んでいます。
       これにより「app.js が古い／別フォルダ」というキャッシュ問題が起きません。
       ===================================================================== -->
  <script>
  "use strict";

  const API_BASE = "http://127.0.0.1:8000";
  const TOKEN_KEY = "fm_token";
  const STATUS_LABEL = { ON_SALE: "出品中", SOLD_OUT: "売切れ" };

  const state = { token: null, user: null, items: [], query: "", pendingDeleteId: null };

  const $  = (sel, root = document) => root.querySelector(sel);
  const el = (tag, cls) => { const n = document.createElement(tag); if (cls) n.className = cls; return n; };

  /* ---- JWT ---- */
  function parseJwt(token) {
    try {
      const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(
        atob(payload).split("").map(c => "%" + c.charCodeAt(0).toString(16).padStart(2, "0")).join("")
      );
      const p = JSON.parse(json);
      return { user_id: p.id, username: p.sub, exp: p.exp };
    } catch { return null; }
  }
  function loadToken() {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) return;
    const user = parseJwt(token);
    if (!user || (user.exp && user.exp * 1000 < Date.now())) { localStorage.removeItem(TOKEN_KEY); return; }
    state.token = token; state.user = user;
  }
  function setToken(token) {
    localStorage.setItem(TOKEN_KEY, token);
    state.token = token; state.user = parseJwt(token);
  }
  function clearToken() { localStorage.removeItem(TOKEN_KEY); state.token = null; state.user = null; }

  /* ---- API ---- */
  class ApiError extends Error { constructor(message, status) { super(message); this.status = status; } }
  function describeError(payload, status) {
    if (payload && typeof payload.detail === "string") return payload.detail;
    if (payload && Array.isArray(payload.detail)) {
      return payload.detail.map(d => {
        const field = Array.isArray(d.loc) ? d.loc[d.loc.length - 1] : "入力";
        return `${field}: ${d.msg}`;
      }).join(" / ");
    }
    return `エラーが発生しました（HTTP ${status}）`;
  }
  async function api(path, { method = "GET", json, form, auth = false } = {}) {
    const headers = {};
    let body;
    if (json !== undefined) { headers["Content-Type"] = "application/json"; body = JSON.stringify(json); }
    if (form !== undefined) { headers["Content-Type"] = "application/x-www-form-urlencoded"; body = new URLSearchParams(form).toString(); }
    if (auth) {
      if (!state.token) throw new ApiError("ログインが必要です", 401);
      headers["Authorization"] = `Bearer ${state.token}`;
    }
    let res;
    try {
      res = await fetch(`${API_BASE}${path}`, { method, headers, body });
    } catch {
      throw new ApiError(`サーバーに接続できません（${API_BASE}）。バックエンドが起動しているか確認してください。`, 0);
    }
    if (res.status === 401 && auth) {
      clearToken(); renderAccount(); renderItems();
      throw new ApiError("セッションが切れました。もう一度ログインしてください。", 401);
    }
    let payload = null;
    const text = await res.text();
    if (text) { try { payload = JSON.parse(text); } catch { payload = text; } }
    if (!res.ok) throw new ApiError(describeError(payload, res.status), res.status);
    return payload;
  }

  /* ---- items ---- */
  async function loadItems() {
    const grid = $("#grid");
    grid.setAttribute("aria-busy", "true");
    renderSkeleton();
    try {
      const q = state.query.trim();
      const path = q.length >= 1 ? `/items?name=${encodeURIComponent(q)}` : "/items";
      state.items = await api(path);
      renderItems();
    } catch (err) {
      renderLoadError(err.message);
    } finally {
      grid.setAttribute("aria-busy", "false");
    }
  }

  /* ---- rendering ---- */
  function money(n) { return Number(n).toLocaleString("ja-JP"); }
  function formatDate(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return "";
    return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}`;
  }
  function renderAccount() {
    const area = $("#account-area");
    area.innerHTML = "";
    if (state.user) {
      const chip = el("span", "user-chip");
      chip.innerHTML = `<span class="user-chip__dot"></span>${escapeHtml(state.user.username)}`;
      const out = el("button", "btn btn--ghost btn--sm");
      out.type = "button";
      out.textContent = "ログアウト";
      out.addEventListener("click", logout);
      area.append(chip, out);
    } else {
      const login = el("button", "btn btn--ghost");
      login.type = "button";
      login.textContent = "ログイン / 新規登録";
      login.addEventListener("click", () => openAuth("login"));
      area.append(login);
    }
  }
  function renderSkeleton() {
    const grid = $("#grid");
    $("#empty").hidden = true;
    grid.innerHTML = "";
    for (let i = 0; i < 6; i++) {
      const c = el("article", "card skeleton");
      c.innerHTML = `
        <div class="sk sk--title"></div>
        <div class="sk sk--line"></div>
        <div class="sk sk--line short"></div>
        <div class="sk sk--tag" style="margin-top:auto"></div>`;
      grid.append(c);
    }
  }
  function renderLoadError(message) {
    const grid = $("#grid");
    grid.innerHTML = "";
    const empty = $("#empty");
    $("#empty-title").textContent = "読み込めませんでした";
    $("#empty-text").textContent = message;
    $("#empty-sell-btn").hidden = true;
    empty.hidden = false;
    setCount(null);
  }
  function setCount(n) {
    const badge = $("#count");
    if (n === null) { badge.hidden = true; return; }
    badge.textContent = `${n}件`;
    badge.hidden = false;
  }
  function renderItems() {
    const grid = $("#grid");
    const empty = $("#empty");
    grid.innerHTML = "";
    setCount(state.items.length);
    if (state.items.length === 0) {
      $("#empty-sell-btn").hidden = false;
      if (state.query.trim().length >= 1) {
        $("#empty-title").textContent = "見つかりませんでした";
        $("#empty-text").textContent = `「${state.query.trim()}」に当てはまる品物はありません。別の言葉で探してみてください。`;
        $("#empty-sell-btn").hidden = true;
      } else {
        $("#empty-title").textContent = "まだ出品がありません";
        $("#empty-text").textContent = "最初の品物を並べて、市を始めましょう。";
      }
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    const mine = state.user?.user_id;
    for (const item of state.items) {
      grid.append(renderCard(item, item.user_id === mine));
    }
  }
  function renderCard(item, isMine) {
    const sold = item.status === "SOLD_OUT";
    const card = el("article", "card" + (isMine ? " is-mine" : "") + (sold ? " is-sold" : ""));
    const head = el("div", "card__head");
    const name = el("h3", "card__name");
    name.textContent = item.name;
    const pill = el("span", "pill " + (sold ? "pill--soldout" : "pill--onsale"));
    pill.textContent = STATUS_LABEL[item.status] ?? item.status;
    head.append(name, pill);

    const desc = el("p", "card__desc" + (item.description ? "" : " is-empty"));
    desc.textContent = item.description || "説明はありません";

    const tagrow = el("div", "card__tagrow");
    const tag = el("span", "price-tag");
    tag.innerHTML = `<span class="price-tag__yen">¥</span><span class="price-tag__num">${money(item.price)}</span>`;
    tagrow.append(tag);

    const foot = el("div", "card__foot");
    const owner = el("span", "card__owner");
    owner.textContent = isMine ? "あなたの出品" : `出品者 #${item.user_id}`;
    foot.append(owner);

    if (isMine) {
      const actions = el("div", "card__actions");
      const edit = el("button", "icon-btn"); edit.type = "button";
      edit.textContent = "編集";
      edit.addEventListener("click", () => openItemDialog(item));
      const del = el("button", "icon-btn icon-btn--danger"); del.type = "button";
      del.textContent = "削除";
      del.addEventListener("click", () => openConfirm(item));
      actions.append(edit, del);
      foot.append(actions);
    }
    card.append(head, desc, tagrow, foot);
    if (sold) { const s = el("span", "stamp"); s.textContent = "SOLD"; card.append(s); }
    return card;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  /* ---- AUTH ---- */
  const authDialog = $("#auth-dialog");
  let authMode = "login";
  function authStatus(msg) { const s = $("#auth-status"); if (s) s.textContent = msg || ""; }

  function openAuth(mode = "login", note = "") {
    setAuthMode(mode);
    const noteEl = $("#auth-note");
    noteEl.textContent = note;
    noteEl.hidden = !note;
    $("#auth-error").hidden = true;
    authStatus("");
    $("#auth-form").reset();
    if (!authDialog.open) authDialog.showModal();
    setTimeout(() => $("#auth-username").focus(), 50);
  }
  function setAuthMode(mode) {
    authMode = mode;
    $("#tab-login").setAttribute("aria-selected", String(mode === "login"));
    $("#tab-signup").setAttribute("aria-selected", String(mode === "signup"));
    $("#auth-title").textContent = mode === "login" ? "おかえりなさい" : "はじめまして";
    $("#auth-submit").textContent = mode === "login" ? "ログイン" : "登録してはじめる";
    $("#auth-password").setAttribute("autocomplete", "off");
    $("#auth-error").hidden = true;
    authStatus("");
  }

  let authBusy = false;
  async function submitAuth(e) {
    if (e) e.preventDefault();
    if (authBusy) return;
    const username = $("#auth-username").value.trim();
    const password = $("#auth-password").value;
    const errEl = $("#auth-error");
    const btn = $("#auth-submit");

    if (username.length < 2) return showFieldError(errEl, "ユーザー名は2文字以上で入力してください。");
    if (password.length < 8) return showFieldError(errEl, "パスワードは8文字以上で入力してください。");

    authBusy = true;
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = "処理中…";
    errEl.hidden = true;
    try {
      if (authMode === "signup") {
        authStatus("① 新規登録を送信中…");
        await api("/auth/signup", { method: "POST", json: { username, password } });
        authStatus("② 登録OK。ログイン中…");
      } else {
        authStatus("ログイン中…");
      }
      const tok = await api("/auth/login", { method: "POST", form: { username, password } });
      if (!tok || !tok.access_token) throw new ApiError("ログイン応答に access_token がありません", 0);
      setToken(tok.access_token);
      authStatus("③ トークン取得・ログイン完了");
      authDialog.close();
      renderAccount();
      renderItems();
      toast(authMode === "signup" ? `ようこそ、${username} さん` : "ログインしました", "ok");
    } catch (err) {
      console.error("[auth] 失敗:", { mode: authMode, status: err.status, message: err.message }, err);
      const where = authMode === "signup" ? "新規登録" : "ログイン";
      authStatus("");
      showFieldError(errEl, `${where}に失敗：${err.message}（status=${err.status ?? "?"}）`);
    } finally {
      authBusy = false;
      btn.disabled = false;
      btn.textContent = original;
    }
  }
  function showFieldError(elem, msg) { elem.textContent = msg; elem.hidden = false; }
  function logout() { clearToken(); renderAccount(); renderItems(); toast("ログアウトしました", "ok"); }

  /* ---- ITEM ---- */
  const itemDialog = $("#item-dialog");
  let editingId = null;
  function openItemDialog(item = null) {
    if (!state.user) { openAuth("login", "出品にはログインが必要です。"); return; }
    editingId = item ? item.id : null;
    const editing = Boolean(item);
    $("#item-title").textContent = editing ? "出品を編集" : "出品する";
    $("#item-sub").textContent = editing ? "内容を変更して保存します。" : "品物の情報を入力してください。";
    $("#item-submit").textContent = editing ? "変更を保存" : "この内容で出品する";
    $("#status-field").hidden = !editing;
    $("#item-error").hidden = true;
    $("#item-name").value  = item ? item.name : "";
    $("#item-price").value = item ? item.price : "";
    $("#item-desc").value  = item ? (item.description ?? "") : "";
    $("#item-status").value = item ? item.status : "ON_SALE";
    clearInvalid();
    if (!itemDialog.open) itemDialog.showModal();
    setTimeout(() => $("#item-name").focus(), 50);
  }
  function clearInvalid() { ["#item-name", "#item-price", "#item-desc"].forEach(s => $(s).classList.remove("is-invalid")); }
  async function submitItem(e) {
    if (e) e.preventDefault();
    const errEl = $("#item-error");
    clearInvalid();
    const name = $("#item-name").value.trim();
    const priceRaw = $("#item-price").value;
    const description = $("#item-desc").value.trim();
    const price = Number(priceRaw);
    if (name.length < 2 || name.length > 50) { $("#item-name").classList.add("is-invalid"); return showFieldError(errEl, "品名は2〜50文字で入力してください。"); }
    if (!Number.isInteger(price) || price < 1) { $("#item-price").classList.add("is-invalid"); return showFieldError(errEl, "価格は1円以上の整数で入力してください。"); }
    if (description.length > 255) { $("#item-desc").classList.add("is-invalid"); return showFieldError(errEl, "説明は255文字までです。"); }
    const btn = $("#item-submit");
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = "保存中…";
    try {
      if (editingId === null) {
        await api("/items", { method: "POST", auth: true, json: { name, price, description: description || null } });
        toast("出品しました", "ok");
      } else {
        const status = $("#item-status").value;
        await api(`/items/${editingId}`, { method: "PUT", auth: true, json: { name, price, description: description || null, status } });
        toast("変更を保存しました", "ok");
      }
      itemDialog.close();
      await loadItems();
    } catch (err) {
      showFieldError(errEl, err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = original;
    }
  }

  /* ---- CONFIRM ---- */
  const confirmDialog = $("#confirm-dialog");
  function openConfirm(item) { state.pendingDeleteId = item.id; $("#confirm-name").textContent = item.name; confirmDialog.showModal(); }
  async function doDelete() {
    const id = state.pendingDeleteId;
    if (id == null) return;
    const btn = $("#confirm-ok");
    btn.disabled = true;
    btn.textContent = "削除中…";
    try {
      await api(`/items/${id}`, { method: "DELETE", auth: true });
      confirmDialog.close();
      toast("出品を取り下げました", "ok");
      await loadItems();
    } catch (err) {
      confirmDialog.close();
      toast(err.message, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "削除する";
      state.pendingDeleteId = null;
    }
  }

  /* ---- TOAST ---- */
  function toast(message, type = "") {
    const t = el("div", "toast" + (type ? ` toast--${type}` : ""));
    t.innerHTML = `<span class="toast__dot"></span>${escapeHtml(message)}`;
    $("#toasts").append(t);
    setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translateY(8px)"; setTimeout(() => t.remove(), 250); }, 3200);
  }

  /* ---- WIRING ---- */
  function debounce(fn, ms) { let id; return (...a) => { clearTimeout(id); id = setTimeout(() => fn(...a), ms); }; }

  function init() {
    loadToken();
    renderAccount();
    loadItems();

    $("#search-input").addEventListener("input", debounce((e) => {
      $("#searching-label").hidden = true;
      state.query = e.target.value;
      loadItems();
    }, 350));

    $("#sell-btn").addEventListener("click", () => openItemDialog());
    $("#empty-sell-btn").addEventListener("click", () => openItemDialog());

    $("#tab-login").addEventListener("click", () => setAuthMode("login"));
    $("#tab-signup").addEventListener("click", () => setAuthMode("signup"));
    // 念のため click でも結線（onclick 属性と二重だが authBusy で安全）
    $("#auth-submit").addEventListener("click", (e) => { e.preventDefault(); submitAuth(e); });
    $("#item-submit").addEventListener("click", (e) => { e.preventDefault(); submitItem(e); });

    $("#confirm-ok").addEventListener("click", doDelete);

    document.querySelectorAll("dialog").forEach(dlg => {
      dlg.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", () => dlg.close()));
      dlg.addEventListener("click", (e) => { if (e.target === dlg) dlg.close(); });
    });

    console.log("のみの市 build9（埋め込み版）初期化完了");
  }

  // インライン配置なので DOM は既に準備済みのことが多い。両対応にする。
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
  </script>
</body>
</html>
